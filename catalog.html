<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>De Simone OS — Catalogo</title>
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
</head>
<body>
<a href="#catalog-main" class="skip-link">Vai al contenuto principale</a>
<div id="toast" role="status" aria-live="polite"></div>
<div class="app-shell">

  <!-- SIDEBAR -->
  <aside class="sidebar" aria-label="Navigazione principale">
    <div class="sidebar-logo" aria-hidden="true">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>
    </div>
    <nav class="sidebar-nav" aria-label="Menu">
      <a href="/catalog.html" class="nav-item active" aria-label="Catalogo articoli" aria-current="page">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
      </a>
    </nav>
    <div class="sidebar-bottom">
      <button style="width:32px;height:32px;border-radius:50%;background:var(--ebony-light);border:1.5px solid var(--coral);display:flex;align-items:center;justify-content:center;color:var(--coral);font-family:var(--serif);font-size:12px;font-weight:700;cursor:pointer;" onclick="window.signOutUser()" aria-label="Esci dall'account">ADS</button>
    </div>
  </aside>

  <!-- LEFT PANEL: Collections -->
  <div class="left-panel">
    <div class="panel-header">
      <div style="font-family:var(--editorial);font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--coral);margin-bottom:8px;">Atelier</div>
      <div style="font-family:var(--serif);font-size:16px;color:white;font-weight:700;">Antonino De Simone</div>
      <div style="font-family:var(--editorial);font-size:13px;color:var(--silver);font-style:italic;margin-top:2px;">Torre del Greco · Dal 1830</div>
    </div>

    <div style="margin:12px 16px;position:relative;">
      <svg style="position:absolute;left:9px;top:50%;transform:translateY(-50%);width:13px;height:13px;color:rgba(255,255,255,0.3);" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
      <input id="searchInput" type="search" aria-label="Cerca articoli" style="width:100%;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08);border-radius:6px;padding:7px 10px 7px 30px;font-family:var(--editorial);font-size:13px;color:white;outline:none;" placeholder="Cerca…">
    </div>

    <div style="padding:12px 16px 6px;font-family:var(--editorial);font-size:9px;letter-spacing:2.5px;text-transform:uppercase;color:rgba(255,255,255,0.25);">Collezioni</div>
    <div id="collectionList"></div>

    <div style="flex:1"></div>
    <div style="padding:12px 16px;">
      <button class="btn-primary" id="btnNewCollection" style="width:100%;justify-content:center;">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Nuova Collezione
      </button>
    </div>
  </div>

  <!-- MAIN -->
  <main class="main" id="catalog-main">
    <div class="topbar" role="toolbar" aria-label="Azioni catalogo">
      <div style="font-family:var(--editorial);font-size:13px;color:var(--text-muted);" id="breadcrumb">Catalogo · Tutti gli articoli</div>
      <div style="font-family:var(--mono);font-size:11px;color:var(--text-muted);margin-left:12px;" id="articleCount"></div>
      <div style="margin-left:auto;display:flex;gap:8px;">
        <button class="btn-ghost" id="btnExport">Esporta</button>
        <button class="btn-primary" id="btnNewArticleTop">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Nuovo Articolo
        </button>
      </div>
    </div>
    <div class="catalog-area">
      <div id="articlesGrid" role="list" aria-label="Articoli catalogo" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:16px;"></div>
    </div>
  </main>

  <!-- DETAIL PANEL -->
  <div class="detail-panel" id="detailPanel">
    <div class="detail-inner" id="detailInner"></div>
  </div>

</div>

<!-- MODAL placeholder — populated by article-form.js -->
<div id="articleModalRoot"></div>

<!-- COLLECTION MODAL -->
<div class="modal-overlay" id="collectionModal" role="dialog" aria-modal="true" aria-labelledby="collectionModalTitle">
  <div class="modal" style="max-width:400px;">
    <div class="modal-header">
      <div>
        <div class="modal-eyebrow">Catalogo · Impostazioni</div>
        <div class="modal-title" id="collectionModalTitle">Nuova Collezione</div>
      </div>
      <button style="background:none;border:none;cursor:pointer;color:var(--text-muted);padding:4px;" onclick="document.getElementById('collectionModal').classList.remove('open')">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="modal-body">
      <div class="form-row full">
        <div class="form-field">
          <label class="field-label">Nome collezione <span class="field-required">*</span></label>
          <input type="text" class="field-input" id="f_coll_name" placeholder="es. Estate">
        </div>
      </div>
      <div class="form-row">
        <div class="form-field">
          <label class="field-label">Codice SKU (4 lettere) <span class="field-required">*</span></label>
          <input type="text" class="field-input" id="f_coll_code" maxlength="4" placeholder="es. ESTA" style="text-transform:uppercase;">
        </div>
        <div class="form-field">
          <label class="field-label">Colore badge <span class="field-required">*</span></label>
          <select class="field-select" id="f_coll_color">
            <option value="#C94030">Rosso Corallo</option>
            <option value="#A8331F">Rosso Scuro</option>
            <option value="#E8A898">Rosa Pastel</option>
            <option value="#D4C4B8">Beige / Chiaro</option>
            <option value="#C9A84C">Oro</option>
            <option value="#B8B4AE">Argento / Grigio</option>
            <option value="#2A2620">Ebano / Scuro</option>
          </select>
        </div>
      </div>
    </div>
    <div class="modal-footer" style="justify-content:flex-end;">
      <button class="btn-primary" id="btnSaveCollection">Salva Collezione</button>
    </div>
  </div>
</div>

<!-- PROCESSING TOAST -->
<div class="processing-toast" id="processingToast" role="status" aria-live="polite" aria-label="Stato pipeline AI">
  <div class="processing-dot" aria-hidden="true"></div>
  <span>Pipeline AI avviata…</span>
  <span style="font-family:var(--mono);font-size:10px;color:var(--coral);margin-left:auto;" id="processingSkuLabel" aria-label="SKU articolo"></span>
</div>

<script src="config.js"></script>
<script type="module" src="js/catalog.js"></script>
</body>
</html>
